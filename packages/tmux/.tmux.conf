# Enable mouse support
set -g mouse on

# Set the prefix key to Ctrl-a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Split panes using | and - (and keep the current path)
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind %
unbind '"'

# add vim mode navigation
set -g mode-keys vi

# Vi copy mode bindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# tmux.nvim - navigation and resize
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

bind-key -n 'M-h' if-shell "$is_vim" 'send-keys M-h' 'resize-pane -L 5'
bind-key -n 'M-j' if-shell "$is_vim" 'send-keys M-j' 'resize-pane -D 5'
bind-key -n 'M-k' if-shell "$is_vim" 'send-keys M-k' 'resize-pane -U 5'
bind-key -n 'M-l' if-shell "$is_vim" 'send-keys M-l' 'resize-pane -R 5'

# Bind 'w' to kill the current pane and 'W' to kill the current window
unbind w
bind w kill-pane
bind W kill-window

# Bind 'e' to choose-tree (replace 'w')
bind e choose-tree -w

# Clear screen and scrollback history
bind x send-keys C-l \; clear-history

# Enable automatic renumbering of windows
set -g renumber-windows on

# Keep custom window names (don't auto-rename from current command)
set -g automatic-rename off

# Set the escape time to 0 for faster key sequences
set -sg escape-time 0

# Status bar off — pane borders handle identification
set -g status off

# Pane borders — highlight active pane
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=default"

# Pane border labels (shown at top of each pane)
set -g pane-border-status top
set -g pane-border-format " #{?pane_active,#[fg=default],#[fg=colour238]}#P: #{pane_current_command} "

# increase the history limit
set-option -g history-limit 50000

